name: Build packages

# Manual packaging smoke: verify electron-builder can complete per platform.
# Pushing version tags also runs `.github/workflows/release.yml` (macOS + Windows installers only; Linux is not part of that release).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build: npm run build:linux
          - os: macos-latest
            build: npm run build:mac
          - os: windows-latest
            build: npm run build:win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build }}
        env:
          # electron-builder on macOS may use this; harmless elsewhere
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
